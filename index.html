<head>

    <style>
        body { background-color: #2c3e50; color: white; text-align: center; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px 10px; }
        .controls, .cheat-container { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin: 0 auto 15px; box-sizing: border-box; }
        
        /* 作弊面板样式 */
        .cheat-panel { 
            margin-top: 6px; padding: 12px; background: rgba(0, 0, 0, 0.85); 
            border: 1px solid #3498db; border-radius: 8px; 
            display: none; flex-wrap: wrap; gap: 8px; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        select, button.ui-btn, .dpad-btn { 
            padding: 10px 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer;
            touch-action: none; transition: all 0.1s; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        select { background: #ecf0f1; color: #2c3e50; }
        button.ui-btn { background: #3498db; color: white; min-width: 90px; font-size: 13px; }
        button.ui-btn:active { background: #2980b9; transform: scale(0.92); }
        
        .btn-orange { background: #e67e22 !important; }
        .btn-green { background: #2ecc71 !important; }
        .btn-red { background: #e74c3c !important; }
        
        .settle-btn { margin-top: 15px; display: none; width: 150px; font-size: 16px; }

        #main-layout { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 30px; max-width: 900px; margin: 0 auto; }
        #game-container { position: relative; width: 100%; max-width: 600px; aspect-ratio: 1 / 1; }
        canvas { background-color: #34495e; border: 5px solid #ecf0f1; border-radius: 8px; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; height: 100%; box-sizing: border-box; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; z-index: 10; }
        #startBtn { padding: 12px 35px; font-size: 20px; background: #2ecc71; color: white; border-radius: 5px; font-weight: bold; }

        .mobile-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .dpad-row { display: flex; gap: 10px; }
        .dpad-btn { width: 65px; height: 65px; font-size: 24px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); color: white; border: 2px solid #ecf0f1; display: flex; justify-content: center; align-items: center; }
        .dpad-btn:active { background: #f1c40f; border-color: #f1c40f; color: #000; }

        @media (max-width: 768px) { 
            #main-layout { flex-direction: column-reverse; gap: 20px; } 
            .dpad-btn { width: 75px; height: 75px; }
            body { padding: 10px 5px; padding-bottom: 20px; }
            h1 { font-size: 1.5em; margin-top: 50px; }
            .controls { max-width: 100%; padding: 0 10px; }
            .cheat-container { max-width: 100%; padding: 0 10px; }
            .cheat-panel { padding: 10px; }
            button.ui-btn { min-width: 70px; font-size: 12px; padding: 8px 10px; }
            select { padding: 8px 10px; font-size: 12px; }
            #game-container { max-width: 100%; }
            .time-display { top: 10px; right: 10px; font-size: 14px; padding: 8px 12px; }
            a[href="index.html"] { top: 10px; left: 10px; padding: 8px 16px; font-size: 14px; }
            .mobile-controls { gap: 8px; }
            .dpad-row { gap: 8px; }
        }

        @media (max-width: 480px) { 
            #main-layout { gap: 15px; }
            .dpad-btn { width: 65px; height: 65px; font-size: 20px; }
            body { padding: 5px; padding-bottom: 15px; }
            h1 { font-size: 1.2em; margin-top: 45px; }
            .controls { margin-bottom: 10px; flex-wrap: wrap; }
            .cheat-container { margin-bottom: 10px; }
            button.ui-btn { min-width: 60px; font-size: 11px; padding: 7px 8px; }
            select { padding: 7px 8px; font-size: 11px; }
            .cheat-panel { gap: 6px; padding: 8px; }
            .time-display { font-size: 12px; padding: 6px 10px; }
            a[href="index.html"] { padding: 6px 12px; font-size: 12px; }
            .mobile-controls { gap: 6px; }
            .dpad-row { gap: 6px; }
            #msg { font-size: 20px; }
            #startBtn { padding: 10px 25px; font-size: 18px; }
        }

        .time-display {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="time-display" id="timeDisplay"></div>
    <a href="index.html" style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #95a5a6; color: white; text-decoration: none; border-radius: 5px; font-family: 'Microsoft YaHei', sans-serif; z-index: 100;">返回</a>
    <h1>🐍 贪吃蛇: 视听全能增强版</h1>

    <div class="controls">
        <div style="text-align: left;">
            <div>得分: <span id="score" style="font-size: 20px; color: #f1c40f;">0</span></div>
            <div style="font-size: 14px; opacity: 0.8;">最高分: <span id="highScore" style="color: #2ecc71;">0</span></div>
        </div>
        <div style="display: flex; gap: 8px;">
            <select id="difficulty" onchange="updateDifficulty()">
                <option value="150">入门</option>
                <option value="100" selected>标准</option>
                <option value="60">高手</option>
            </select>
            <button class="ui-btn btn-orange" onclick="togglePause()">暂停</button>
        </div>
    </div>
 
    <div class="cheat-container">
        <button class="ui-btn" onclick="toggleCheatPanel()">⚙️ 设置与作弊菜单</button>
        <div id="cheatPanel" class="cheat-panel">
            <button class="ui-btn btn-green" onclick="addScore(100)">+100分</button>
            <button class="ui-btn btn-green" onclick="growSnakeCheat(5)">增长[5]</button>
            <button class="ui-btn btn-green" onclick="teleportToFood()">瞬移吃食</button>
            <button class="ui-btn btn-red" onclick="toggleInvincible()">无敌: <span id="invincibleState">关</span></button>
            <button class="ui-btn btn-red" onclick="toggleSuperSpeed()">超音速: <span id="speedState">关</span></button>
            <button class="ui-btn" onclick="toggleBGM()">背景音乐: <span id="bgmState">关</span></button>
            <button class="ui-btn" onclick="toggleMute()">所有音效: <span id="muteState">开</span></button>
        </div>
    </div>

    <div id="main-layout">
        <div class="mobile-controls">
            <button class="dpad-btn" id="btn-up">▲</button>
            <div class="dpad-row">
                <button class="dpad-btn" id="btn-left">◀</button>
                <button class="dpad-btn" id="btn-down">▼</button>
                <button class="dpad-btn" id="btn-right">▶</button>
            </div>
            <div style="margin-top: 10px; font-size: 12px; opacity: 0.7;">
                🟡10分(长1) 🟣20分(长2) 🔴50分(长5)
            </div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div id="overlay">
                <div id="msg" style="font-size: 24px; margin-bottom: 10px;">准备开饭了吗？</div>
                <button id="startBtn" onclick="startGame()">开始游戏</button>
                <button id="settleBtn" class="ui-btn settle-btn btn-orange" onclick="immediateSettle()">立即结算得分</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const overlay = document.getElementById("overlay");
        const msg = document.getElementById("msg");
        const difficultySelect = document.getElementById("difficulty");
        const settleBtn = document.getElementById("settleBtn");
        const startBtn = document.getElementById("startBtn");

        const grid = 20;
        let snake, foods, dx, dy, score, gameLoop;
        let pendingGrowth = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let isPaused = false, isGameOver = true;
        let invincible = false, isSuperSpeed = false, isMuted = false, bgmEnabled = false;

        highScoreElement.innerText = highScore;

        /* --- 🎵 声音引擎 (音量增强版) --- */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgmInterval = null;
        let bgmStep = 0;
        const melody = [261, 196, 261, 329, 392, 329, 261, 196, 293, 220, 293, 349, 440, 349, 293, 220];

        function playSound(freq, type, duration, vol = 0.1) {
            if (isMuted) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                // 线性衰减让声音更清脆
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const sfx = {
            eat10: () => playSound(600, 'sine', 0.1, 0.2),
            eat20: () => playSound(800, 'sine', 0.1, 0.2),
            eat50: () => { playSound(1000, 'sine', 0.1, 0.2); setTimeout(()=>playSound(1200, 'sine', 0.1, 0.2), 50); },
            gameOver: () => { playSound(300, 'square', 0.4, 0.1); playSound(150, 'square', 0.6, 0.1); },
            click: () => playSound(440, 'triangle', 0.05, 0.1)
        };

        function startBGM() {
            if (bgmInterval) clearInterval(bgmInterval);
            if (!bgmEnabled) return;
            bgmInterval = setInterval(() => {
                if (isPaused || isGameOver) return;
                // BGM音量由 0.02 提升至 0.08，约 4 倍响度
                playSound(melody[bgmStep], 'triangle', 0.18, 0.08);
                bgmStep = (bgmStep + 1) % melody.length;
            }, 200);
        }

        function stopBGM() { clearInterval(bgmInterval); bgmInterval = null; }

        /* --- ⚙️ 系统功能 --- */
        function toggleCheatPanel() {
            sfx.click();
            const panel = document.getElementById('cheatPanel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function addScore(amount) {
            if (isGameOver) return;
            score += amount;
            scoreElement.innerText = score;
            sfx.eat50();
            checkHighScore();
        }

        function growSnakeCheat(amount) {
            if (isGameOver) return;
            pendingGrowth += amount;
            sfx.click();
        }

        function teleportToFood() {
            if (isGameOver || foods.length === 0) return;
            const idx = Math.floor(Math.random() * foods.length);
            const f = foods[idx];
            snake[0] = { x: f.x, y: f.y };
            handleEat(idx);
        }

        function toggleInvincible() {
            invincible = !invincible;
            sfx.click();
            document.getElementById('invincibleState').innerText = invincible ? '开' : '关';
        }

        function toggleSuperSpeed() {
            if (isGameOver) return;
            isSuperSpeed = !isSuperSpeed;
            sfx.click();
            document.getElementById('speedState').innerText = isSuperSpeed ? "开" : "关";
            setLoop(isSuperSpeed ? 35 : parseInt(difficultySelect.value));
        }

        function toggleBGM() {
            bgmEnabled = !bgmEnabled;
            sfx.click();
            document.getElementById('bgmState').innerText = bgmEnabled ? "开" : "关";
            if (bgmEnabled && !isGameOver && !isPaused) startBGM(); else stopBGM();
        }

        function toggleMute() {
            isMuted = !isMuted;
            sfx.click();
            document.getElementById('muteState').innerText = isMuted ? "关" : "开";
        }

        function updateDifficulty() {
            if (!isGameOver && !isPaused && !isSuperSpeed) {
                setLoop(parseInt(difficultySelect.value));
            }
        }

        /* --- 游戏主流程 --- */
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            sfx.click();
            resetData();
            overlay.style.display = "none";
            setLoop(isSuperSpeed ? 35 : parseInt(difficultySelect.value));
            startBGM();
        }

        function resetData() {
            snake = [{x: 160, y: 200}, {x: 140, y: 200}, {x: 120, y: 200}];
            foods = []; pendingGrowth = 0; dx = grid; dy = 0; score = 0;
            for(let i=0; i<3; i++) createFood();
            scoreElement.innerText = "0";
            isPaused = false; isGameOver = false;
        }

        function createFood() {
            let rand = Math.random();
            let type = rand < 0.2 ? {c:'#e74c3c', p:50, g:5, s:'eat50'} : 
                       rand < 0.5 ? {c:'#9b59b6', p:20, g:2, s:'eat20'} : 
                                    {c:'#f1c40f', p:10, g:1, s:'eat10'};
            const newF = { x: Math.floor(Math.random() * (canvas.width / grid)) * grid, 
                           y: Math.floor(Math.random() * (canvas.height / grid)) * grid, ...type };
            if (snake.some(p => p.x === newF.x && p.y === newF.y)) createFood();
            else foods.push(newF);
        }

        function main() {
            if (isPaused) return;
            if (checkGameOver()) {
                endGame("Game Over!");
                return;
            }
            advanceSnake();
            draw();
        }

        function advanceSnake() {
            let h = { x: snake[0].x + dx, y: snake[0].y + dy };
            if (invincible) {
                if (h.x < 0) h.x = canvas.width - grid; else if (h.x >= canvas.width) h.x = 0;
                if (h.y < 0) h.y = canvas.height - grid; else if (h.y >= canvas.height) h.y = 0;
            }
            snake.unshift(h);
            let fi = foods.findIndex(f => f.x === h.x && f.y === h.y);
            if (fi !== -1) handleEat(fi);
            else if (pendingGrowth > 0) pendingGrowth--;
            else snake.pop();
        }

        function handleEat(i) {
            let f = foods[i];
            score += f.p;
            scoreElement.innerText = score;
            sfx[f.s]();
            pendingGrowth += (f.g - 1);
            checkHighScore();
            foods.splice(i, 1);
            createFood();
        }

        function checkGameOver() {
            if (invincible) return false;
            let h = snake[0];
            if (h.x < 0 || h.x >= canvas.width || h.y < 0 || h.y >= canvas.height) return true;
            for (let i = 1; i < snake.length; i++) if (h.x === snake[i].x && h.y === snake[i].y) return true;
            return false;
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            sfx.click();
            if (isPaused) {
                overlay.style.display = "flex";
                msg.innerText = "游戏暂停中";
                settleBtn.style.display = "block";
                startBtn.innerText = "继续游戏";
                startBtn.onclick = resumeGame;
            } else {
                overlay.style.display = "none";
                msg.innerText = "";
                settleBtn.style.display = "none";
                startBtn.innerText = "开始游戏";
                startBtn.onclick = startGame;
            }
        }

        function resumeGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            sfx.click();
            isPaused = false;
            overlay.style.display = "none";
            startBtn.onclick = startGame;
            startBGM();
        }

        function immediateSettle() { endGame("手动结算成绩"); }

        function endGame(txt) {
            isGameOver = true;
            clearInterval(gameLoop);
            stopBGM();
            sfx.gameOver();
            overlay.style.display = "flex";
            msg.innerText = txt + " 得分: " + score;
            settleBtn.style.display = "none";
            startBtn.innerText = "再来一局";
        }

        function checkHighScore() {
            if (score > highScore) {
                highScore = score;
                highScoreElement.innerText = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        function draw() {
            ctx.fillStyle = "#34495e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            foods.forEach(f => {
                ctx.fillStyle = f.c; ctx.shadowBlur = 10; ctx.shadowColor = f.c;
                ctx.fillRect(f.x + 1, f.y + 1, grid - 2, grid - 2);
            });
            ctx.shadowBlur = 0;
            for (let i = 1; i < snake.length; i++) {
                ctx.fillStyle = "#2ecc71"; ctx.fillRect(snake[i].x + 1, snake[i].y + 1, grid - 2, grid - 2);
            }
            ctx.fillStyle = invincible ? "#00d2ff" : "#f39c12"; 
            ctx.fillRect(snake[0].x + 1, snake[0].y + 1, grid - 2, grid - 2);
        }

        function setLoop(ms) { if (gameLoop) clearInterval(gameLoop); gameLoop = setInterval(main, ms); }
        
        function changeDirection(nx, ny) {
            if (isPaused || isGameOver) return;
            if (dx === 0 && nx !== 0) { dx = nx; dy = 0; }
            if (dy === 0 && ny !== 0) { dx = 0; dy = ny; }
        }

        // 按钮绑定
        const bind = (id, x, y) => document.getElementById(id).addEventListener('pointerdown', e => { 
            e.preventDefault(); changeDirection(x, y); 
        }, {passive:false});
        bind('btn-up', 0, -grid); bind('btn-down', 0, grid); bind('btn-left', -grid, 0); bind('btn-right', grid, 0);

        // 键盘绑定
        document.addEventListener("keydown", e => {
            const keys = {32: 'p', 37: [-grid, 0], 38: [0, -grid], 39: [grid, 0], 40: [0, grid]};
            if (keys[e.keyCode]) {
                e.preventDefault();
                if (keys[e.keyCode] === 'p') togglePause();
                else changeDirection(...keys[e.keyCode]);
            }
        });

        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const timeString = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            document.getElementById('timeDisplay').textContent = timeString;
        }

        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
